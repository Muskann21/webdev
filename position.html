<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position CSS</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .box {
        height: 133px;
        width: 80vw;
        border: 2px solid black;
        margin: 3px;
        padding: 3px;
    }
    .box1{
        background-color: aqua;
        position: absolute;
        top: 0px;/*nearest positioned ancestor*/
    }
    .box2{
        background-color: aliceblue;
        /*position: relative;
        top: 34px;
        left: 56px;
        z-index: 1;/*jiska z index zyada that overlaps*/
    }
    .box3{
        background-color: antiquewhite;
    }
    .box4{
        background-color: purple;
    }
    .parent{
        margin: 33px;
        padding: 43px;
        border: 2px solid purple;
    }
</style>

<body>
    <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    </div>
</body>

</html>
